<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "TON_API_KEY",
    authDomain: "TON_PROJECT.firebaseapp.com",
    projectId: "TON_PROJECT",
    storageBucket: "TON_PROJECT.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const storage = getStorage(app);

  // 📤 UPLOAD MUSIC
  window.uploadMusic = async function () {
    const title = document.getElementById("title").value;
    const artist = document.getElementById("artist").value;
    const file = document.getElementById("audioFile").files[0];

    if (!file) {
      alert("Choisis un fichier audio");
      return;
    }

    const storageRef = ref(storage, "music/" + file.name);
    await uploadBytes(storageRef, file);
    const url = await getDownloadURL(storageRef);

    await addDoc(collection(db, "songs"), {
      title,
      artist,
      url,
      created: Date.now()
    });

    alert("✅ Son ajouté !");
    loadSongs();
  }

  // 📥 LOAD MUSIC
  async function loadSongs() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    const q = query(collection(db, "songs"), orderBy("created", "desc"));
    const querySnapshot = await getDocs(q);

    querySnapshot.forEach((doc) => {
      const data = doc.data();

      list.innerHTML += `
        <p>
          🎵 ${data.title} - ${data.artist}<br>
          <audio controls src="${data.url}"></audio>
        </p>
        <hr>
      `;
    });
  }

  loadSongs();
</script>
