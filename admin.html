<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Admin - Woroba Streaming</title>
</head>

<body>
  <h1>🎧 Panel Admin Woroba Streaming</h1>

  <h3>Ajouter un son</h3>

  <input type="text" id="title" placeholder="Titre du son"><br><br>
  <input type="text" id="artist" placeholder="Artiste"><br><br>
  <input type="file" id="audioFile"><br><br>

  <button onclick="uploadMusic()">Uploader</button>

  <hr>

  <h3>Liste des sons</h3>
  <div id="list"></div>

</body>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<script>
  // 🔥 CONFIG FIREBASE (remplace avec ton projet)
  const firebaseConfig = {
    apiKey: "TON_API_KEY",
    authDomain: "TON_PROJECT.firebaseapp.com",
    projectId: "TON_PROJECT",
    storageBucket: "TON_PROJECT.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
  };

  firebase.initializeApp(firebaseConfig);

  const db = firebase.firestore();
  const storage = firebase.storage();

  // 📤 UPLOAD MUSIC
  function uploadMusic() {
    let title = document.getElementById("title").value;
    let artist = document.getElementById("artist").value;
    let file = document.getElementById("audioFile").files[0];

    if (!file) {
      alert("Choisis un fichier audio");
      return;
    }

    let uploadTask = storage.ref("music/" + file.name).put(file);

    uploadTask.on("state_changed",

      null,

      (error) => {
        alert("Erreur upload");
      },

      () => {
        uploadTask.snapshot.ref.getDownloadURL().then((url) => {

          db.collection("songs").add({
            title: title,
            artist: artist,
            url: url,
            created: Date.now()
          });

          alert("Son ajouté !");
          loadSongs();
        });
      }
    );
  }

  // 📥 AFFICHER LES SONS
  function loadSongs() {
    document.getElementById("list").innerHTML = "";

    db.collection("songs").orderBy("created", "desc").get()
      .then((snapshot) => {
        snapshot.forEach((doc) => {
          let data = doc.data();

          document.getElementById("list").innerHTML += `
            <p>
              🎵 ${data.title} - ${data.artist}
              <br>
              <audio controls src="${data.url}"></audio>
            </p>
            <hr>
          `;
        });
      });
  }

  loadSongs();
</script>

</html>
