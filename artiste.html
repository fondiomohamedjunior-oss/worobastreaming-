<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSMA-STREAMING</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

.header{
    background:#ff7a00;
    padding:20px;
}

.logo{
    width:120px;
    border-radius:15px;
}

.card{
    width:90%;
    max-width:500px;
    margin:20px auto;
    background:#1a1a1a;
    border-radius:20px;
    padding:20px;
    animation:fadeIn 0.8s ease;
}

.photo-container{
    position:relative;
    width:180px;
    height:180px;
    margin:auto;
}

.photo{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #ff7a00;
    box-shadow:0 0 25px #ff7a00;
}

.flag{
    position:absolute;
    bottom:0;
    right:0;
    font-size:35px;
    background:white;
    border-radius:50%;
    padding:2px;
}

.nom{
    margin-top:15px;
    font-size:28px;
    font-weight:bold;
    color:#ff7a00;
}

.bio{
    margin-top:15px;
    line-height:1.6;
}

.btn{
    display:block;
    width:85%;
    margin:15px auto;
    padding:15px;
    background:#ff7a00;
    color:white;
    text-decoration:none;
    border-radius:15px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    background:#ffb347;
    color:black;
}

.btn:active{
    transform:scale(0.95);
}

.indispo{
    background:#222;
    width:85%;
    margin:10px auto;
    padding:12px;
    border-radius:10px;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="header">
<img src="images/logo.jpg" class="logo">
</div>
