<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artiste</title>

<style>
body{
background:#111;
color:white;
font-family:Arial,sans-serif;
text-align:center;
margin:0;
}

.header{
background:#ff7a00;
padding:20px;
font-size:25px;
font-weight:bold;
}

.photo{
width:180px;
height:180px;
border-radius:50%;
background:#333;
margin:20px auto;
display:flex;
align-items:center;
justify-content:center;
font-size:60px;
border:4px solid #ff7a00;
}

.nom{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

.bio{
width:90%;
margin:auto;
padding:15px;
line-height:1.6;
}

.bloc{
background:#222;
width:85%;
margin:15px auto;
padding:15px;
border-radius:15px;
}

.btn{
background:#ff7a00;
padding:15px;
border-radius:12px;
font-weight:bold;
margin-bottom:10px;
}

.indispo{
color:#ccc;
padding:10px;
}
</style>
</head>

<body>

<div class="header">
🎧 JSMA-STREAMING
</div>

<div class="photo">🎤</div>

<div class="nom" id="nomArtiste"></div>

<div class="bio">
Biographie bientôt disponible.
</div>

<div class="bloc">
<div class="btn">💿 ALBUMS</div>
<div class="indispo">❌ PAS ENCORE DISPONIBLE</div>
</div>

<div class="bloc">
<div class="btn">🎵 EP</div>
<div class="indispo">❌ PAS ENCORE DISPONIBLE</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const artiste = params.get("artiste");
document.getElementById("nomArtiste").textContent = artiste;
</script>

</body>
  </html>
